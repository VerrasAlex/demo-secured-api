spring.application.name=gateway-service
server.port=8082

# Route all /api/** requests to the api-service
spring.cloud.gateway.routes[0].id=api-service
spring.cloud.gateway.routes[0].uri=http://localhost:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/**
spring.cloud.gateway.routes[0].filters[0]=TokenRelay=

# Validate JWTs issued by Keycloak
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/demo

# Register as OAuth2 client for token relay
spring.security.oauth2.client.registration.keycloak.client-id=gateway-client
spring.security.oauth2.client.registration.keycloak.client-secret=I9dUynldolN03e9u3TpKEwLk1CV2KyBJ
spring.security.oauth2.client.registration.keycloak.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.keycloak.scope=openid,profile,roles

spring.security.oauth2.client.provider.keycloak.issuer-uri=http://localhost:8080/realms/demo