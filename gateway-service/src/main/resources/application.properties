spring.application.name=gateway-service
server.port=8082

spring.cloud.gateway.server.webflux.routes[0].id=api-service
spring.cloud.gateway.server.webflux.routes[0].uri=http://localhost:8081
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/**

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/demo